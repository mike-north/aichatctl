<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>aichatctl bridge — options</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; margin: 2rem; max-width: 40rem; }
      input { width: 100%; padding: 0.5rem; font-family: monospace; box-sizing: border-box; }
      button { margin-top: 0.75rem; padding: 0.5rem 1rem; }
      .status { margin-top: 0.75rem; color: #2a7; }
      code { background: #f3f3f3; padding: 0 0.25rem; }
    </style>
  </head>
  <body>
    <h1>aichatctl bridge</h1>
    <p>
      Paste the bridge token printed by <code>aichatctl bridge serve</code>. It is
      stored locally and presented when the extension connects to the bridge.
    </p>
    <input id="token" type="text" placeholder="bridge token" autocomplete="off" />
    <button id="save">Save</button>
    <div class="status" id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
