name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Secrets (NODE_AUTH_TOKEN) live in this GitHub Environment.
    environment: npm-publish
    permissions:
      contents: write # push the version PR + tags, create GitHub Releases
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm provenance (public repo OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full history/tags

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When there are pending changesets, this opens/updates a "Version Packages"
      # PR. When there are none and versions differ from npm, it publishes.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
